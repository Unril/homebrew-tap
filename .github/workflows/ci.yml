name: CI

on:
  push:
    branches:
      - main
    paths:
      - "Formula/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-bot:
    strategy:
      fail-fast: false
      matrix:
        # No macos-26-intel: Homebrew is phasing out Intel macOS support (Tier 3
        # from Sep 2026). homebrew-core no longer guarantees Intel bottles for all
        # deps, so brew test-bot skips bottle builds on Intel. Intel users can
        # still build from source.
        os: [macos-26]
        include:
          - os: ubuntu-latest
            container: ghcr.io/homebrew/brew:main
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    timeout-minutes: 30
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - name: Validate formula checksums
        run: |
          dir="$(brew --repository "${{github.repository}}")/Formula"
          for f in "$dir"/*.rb; do
            if grep -q 'TODO_REPLACE' "$f"; then
              echo "::error file=${f##*/}::sha256 placeholder not replaced -- update with actual checksum before merging"
              exit 1
            fi
          done

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: (success() || failure()) && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: bottles_${{ matrix.os }}
          path: "*.bottle.*"
