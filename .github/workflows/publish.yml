name: Publish

# Triggers automatically when CI completes successfully on a PR.
# Can also be triggered manually with a PR number.
# brew pr-pull downloads bottle artifacts, adds the bottle do block,
# and pushes to main.
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      pull_request:
        description: "PR number to publish bottles for"
        required: true

jobs:
  pr-pull:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    concurrency: publish
    timeout-minutes: 10
    permissions:
      actions: read
      checks: read
      contents: write
      pull-requests: write
    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v9
        with:
          script: |
            // Manual trigger: use the input directly
            if (context.eventName === 'workflow_dispatch') {
              const prNumber = context.payload.inputs.pull_request;
              core.info(`Manual trigger for PR #${prNumber}`);
              return prNumber;
            }

            // Automatic trigger: extract from workflow run
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            const prs = run.data.pull_requests;
            if (!prs || prs.length === 0) {
              core.info('No PR associated with this workflow run, skipping.');
              return '';
            }
            const prNumber = prs[0].number;

            // Check if the PR changed any formula files
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const hasFormulaChange = files.some(f => f.filename.startsWith('Formula/'));
            if (!hasFormulaChange) {
              core.info(`PR #${prNumber} has no formula changes, skipping bottle publish.`);
              return '';
            }

            return String(prNumber);
          result-encoding: string

      - name: Set up Homebrew
        if: steps.pr.outputs.result != ''
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        if: steps.pr.outputs.result != ''
        uses: Homebrew/actions/git-user-config@main

      - name: Pull bottles
        if: steps.pr.outputs.result != ''
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ steps.pr.outputs.result }}
        run: brew pr-pull --debug --tap="$GITHUB_REPOSITORY" --workflows=ci.yml "$PULL_REQUEST"

      - name: Push commits
        if: steps.pr.outputs.result != ''
        uses: Homebrew/actions/git-try-push@main
        with:
          branch: main

      - name: Delete branch
        if: >
          steps.pr.outputs.result != '' &&
          github.event_name != 'workflow_dispatch' &&
          github.event.workflow_run.head_repository.fork == false
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: git push --delete origin -- "refs/heads/$BRANCH"
