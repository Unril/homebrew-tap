name: Verify

# Runs after Publish pushes bottle metadata to main.
# Installs from the tap on each platform and confirms the bottle poured.
on:
  workflow_run:
    workflows: ["Publish"]
    types:
      - completed
  workflow_dispatch:

jobs:
  verify:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26]
        include:
          - os: ubuntu-latest
            container: ghcr.io/homebrew/brew:main
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Install from tap
        run: brew install Unril/tap/klspw

      - name: Verify version
        run: klspw --version

      - name: Verify basic functionality
        run: |
          mkdir -p /tmp/verify-test
          echo "" > /tmp/verify-test/build.gradle.kts
          klspw init /tmp/verify-test
